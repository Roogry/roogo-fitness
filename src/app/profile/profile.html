<app-header title="Profile"></app-header>
<div class="px-4 py-8 w-full max-w-2xl mx-auto flex flex-col items-center justify-center mt-20">
  <div class="w-24 h-24 rounded-full bg-muted flex items-center justify-center border-4 border-background shadow-sm mb-4 overflow-hidden">
    <lucide-icon [img]="User" class="w-10 h-10 text-muted-foreground/60"></lucide-icon>
  </div>
  <h2 class="text-2xl font-bold">Roogo User</h2>
  <p class="text-sm text-muted-foreground mb-8">Ready to crush some goals</p>
  
  <div class="w-full space-y-4">
    <div class="p-4 bg-card border border-border rounded-xl">
      <h3 class="font-medium">Settings</h3>
      <p class="text-sm text-muted-foreground mt-1">Profile settings coming soon.</p>
    </div>
  </div>
</div>
