<z-card>
  <div class="flex justify-between items-center mb-4">
    <div class="flex flex-col gap-2">
      <span class="font-bold text-base sm:text-lg">{{ session().session_title }}</span>
      <div class="flex items-center gap-2">
        <z-badge
          zType="secondary"
          [zTooltip]="(session().start_time | date: 'medium') + ' until ' + (session().end_time | date: 'medium')"
        >
          {{ session().total_duration | durationFormat }}
        </z-badge>
        <z-badge
          zType="secondary"
        >
          {{ session().total_weight_lifted | number: '1.0-1' }} kg
        </z-badge>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <span 
        class="text-sm text-muted-foreground"
        [zTooltip]="session().createdAt ? (session().createdAt | date: 'medium') : 'unknown'"
      >
        {{ session().createdAt | timeAgo }}
      </span>
      <div class="bg-primary/5 text-primary p-2 rounded-full flex-shrink-0">
        <lucide-icon [img]="Activity" class="size-4"></lucide-icon>
      </div>
    </div>
  </div>

  @if (session().notes) {
    <div class="bg-muted/30 border border-border/50 rounded-xl p-3 mb-4">
      <p class="text-sm text-muted-foreground italic">"{{ session().notes }}"</p>
    </div>
  }

  <div
    class="bg-secondary/50 rounded-[16px] p-3.5 flex justify-between items-center group cursor-pointer hover:bg-secondary/80 transition-colors"
  >
    <span
      class="text-sm font-medium text-secondary-foreground line-clamp-1 truncate mr-4"
    >
      {{ getExerciseSummary(session()) }}
    </span>
    <div
      class="bg-background/50 rounded-full p-1.5 group-hover:bg-background transition-colors"
    >
      <lucide-icon
        [img]="ArrowRight"
        class="w-4 h-4 text-foreground flex-shrink-0"
      ></lucide-icon>
    </div>
  </div>
</z-card>
