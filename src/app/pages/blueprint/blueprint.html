<div class="mb-8">
  <app-header title="Blueprint">
    <button right z-button zShape="circle" (click)="openCreatePlanSheet()">
      <lucide-icon [img]="FolderPlus"></lucide-icon>
      Plan
    </button>
  </app-header>

  <div class="container max-w-2xl mx-auto px-4">
    <div class="grid gap-4">
      @if (displayedPlans.length === 0) {
        <div
          class="flex flex-col items-center justify-center text-center p-10 border border-border rounded-4xl"
        >
          <div class="p-4 bg-background border border-border rounded-full mb-4">
            <lucide-icon [img]="Dumbbell" class="w-8 h-8 text-muted-foreground"></lucide-icon>
          </div>
          <h3 class="font-semibold text-lg mb-1">No Plans Yet</h3>
          <p class="text-sm text-muted-foreground">
            Create your first workout plan to get started.
          </p>
        </div>
      } @else {
        @for (plan of displayedPlans; track plan.id) {
          <app-plan-card
            [plan]="plan"
            [isExpanded]="expandedPlanId() === plan.id"
            (onToggle)="togglePlan(plan.id)"
            (onEdit)="editPlan($event, plan)"
            (onDelete)="deletePlan($event, plan.id)"
          ></app-plan-card>
        }
      }
    </div>

    <!-- Plan Form Sheet -->
    <app-sheet
      [isOpen]="isOpenPlanForm()"
      (onOpenChange)="isOpenPlanForm.set($event)"
      [title]="workoutService.selectedPlanId() ? 'Edit Plan' : 'Create Plan'"
      description="Design your new workout routine."
    >
      <!-- Sheet Content (Scrollable) -->
      <div class="flex flex-col gap-6">
        <div class="flex flex-col gap-3">
          <label
            for="name"
            class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70"
          >
            Plan Name <span class="text-destructive">*</span>
          </label>
          <input
            id="name"
            name="name"
            z-input
            [(ngModel)]="newPlan.title"
            required
            placeholder="e.g. Push Pull Legs"
            class="w-full"
          />
        </div>

        <div class="flex flex-col gap-3">
          <label
            for="description"
            class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70"
          >
            Description
          </label>
          <textarea
            id="description"
            name="description"
            z-input
            rows="3"
            [(ngModel)]="newPlan.description"
            required
            placeholder="Optional details about this plan..."
            class="w-full"
          ></textarea>
        </div>

        <div class="flex flex-col gap-3">
          <label
            class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70"
          >
            Sessions Per Week
          </label>
          <div
            class="flex items-center justify-between p-1 bg-secondary/50 rounded-2xl border border-border"
          >
            <button
              z-button
              zType="ghost"
              class="w-10 h-10 rounded-xl flex items-center justify-center bg-background border border-border text-foreground hover:bg-muted disabled:opacity-50"
              (click)="
                newPlan.sessionsPerWeek =
                  newPlan.sessionsPerWeek > 1 ? newPlan.sessionsPerWeek - 1 : 1
              "
              [disabled]="newPlan.sessionsPerWeek <= 1"
            >
              <lucide-icon [img]="Minus" class="w-4 h-4"></lucide-icon>
            </button>
            <div class="flex flex-col items-center justify-center w-16">
              <span class="text-xl font-bold">{{ newPlan.sessionsPerWeek }}</span>
            </div>
            <button
              z-button
              zType="ghost"
              class="w-10 h-10 rounded-xl flex items-center justify-center bg-background border border-border text-foreground hover:bg-muted disabled:opacity-50"
              (click)="
                newPlan.sessionsPerWeek =
                  newPlan.sessionsPerWeek < 7 ? newPlan.sessionsPerWeek + 1 : 7
              "
              [disabled]="newPlan.sessionsPerWeek >= 7"
            >
              <lucide-icon [img]="Plus" class="w-4 h-4"></lucide-icon>
            </button>
          </div>
        </div>
      </div>

      <!-- Sheet Footer -->
      <div app-sheet-footer>
        <div class="mb-4">
          <button
            z-button
            zShape="circle"
            class="w-full"
            [disabled]="!newPlan.title.trim()"
            (click)="savePlan()"
          >
            <lucide-icon [img]="Save"></lucide-icon>
            {{ workoutService.selectedPlanId() ? 'Save Changes' : 'Save Plan' }}
          </button>
        </div>
      </div>
    </app-sheet>
  </div>
</div>
