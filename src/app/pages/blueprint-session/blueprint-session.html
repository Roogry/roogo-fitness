<div class="min-h-screen bg-background text-foreground pb-20">
  <!-- Header -->
  <app-header 
    [title]="selectedSession()?.id ? 'Edit Session' : 'New Session'" 
    [showBackBtn]="true" 
    class="sticky top-0"
  >
    @if (workoutService.hasExercise()) {
      <button
        right
        z-button
        zShape="circle"
        (click)="createSession()"
      >
        <lucide-icon [img]="Check" class="mr-1 hidden sm:inline-block"></lucide-icon>
        <span>Create</span>
      </button>
    }
  </app-header>

  <main class="container mx-auto px-4 pb-6 max-w-2xl mt-4">
    <div class="mb-6 flex flex-col gap-3">
      <label
        for="title"
        class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70"
      >
        Session Title
      </label>
      <input
        id="title"
        name="title"
        z-input
        [ngModel]="workoutService.sessionTitle()"
        (ngModelChange)="workoutService.sessionTitle.set($event)"
        required
        placeholder="Name your session..."
        class="w-full"
      />
    </div>

    <!-- Active Exercises -->
    <div class="space-y-6">
      @if (workoutService.trackedExercises().length === 0) {
        <div
          class="py-8 text-center text-muted-foreground border-2 border-dashed border-border rounded-xl"
        >
          <lucide-icon [img]="Dumbbell" class="h-12 w-12 mx-auto mb-4"></lucide-icon>
          <p>Choose exercises to put in.</p>
        </div>
      }

      @for (tracked of workoutService.trackedExercises(); track tracked.exercise.id) {
        <app-exercise-tracker [trackedExercise]="tracked"></app-exercise-tracker>
      }

      <button z-button zShape="circle" class="w-full" (click)="isAddSheetOpen.set(true)">
        <lucide-icon [img]="Plus"></lucide-icon>
        Add Exercise
      </button>
    </div>
  </main>

  <!-- Add Exercise Sheet -->
  <app-sheet
    [isOpen]="isAddSheetOpen()"
    (onOpenChange)="isAddSheetOpen.set($event)"
    title="Add Exercise"
    description="Search or add a custom exercise."
  >
    <app-exercise-autocomplete
      (exerciseSelected)="onExerciseSelected($event)"
    ></app-exercise-autocomplete>
  </app-sheet>
</div>
