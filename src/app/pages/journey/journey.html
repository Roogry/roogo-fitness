<div class="mb-8">
  <app-header title="Your Journey"></app-header>
  <div class="px-4 w-full max-w-2xl mx-auto flex flex-col">
    @if (isLoading()) {
      <div class="flex items-center justify-center p-12">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
      </div>
    } @else if (history().length === 0) {
      <div class="flex flex-col items-center justify-center text-center p-10 rounded-4xl border border-border">
        <div class="p-4 border border-border rounded-full mb-4">
          <lucide-icon [img]="Activity" class="w-8 h-8 text-muted-foreground"></lucide-icon>
        </div>
        <h3 class="font-semibold text-lg mb-1">No Workouts Yet</h3>
        <p class="text-sm text-muted-foreground">Log your first workout to see it here.</p>
      </div>
    } @else {
      <div class="flex flex-col gap-4">
        @for (session of history(); track session.id) {
          <app-logged-workout-card [session]="session" />
        }
      </div>
    }
  </div>
</div>
